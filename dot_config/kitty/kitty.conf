editor "/Applications/Sublime Text.app/Contents/SharedSupport/bin/subl" -n -w
window_margin_width 10

font_size 16.0
disable_ligatures always

scrollback_lines 20000


strip_trailing_spaces always

initial_window_width 155c
initial_window_height 50c
single_window_margin_width 3
window_padding_width 8
remember_window_size no

map cmd+enter new_window_with_cwd
map cmd+shift+enter new_os_window_with_cwd

copy_on_select clipboard

background_opacity 0.88
dynamic_background_opacity yes

cursor_shape beam
cursor_blink_interval 0.5

tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style bold
inactive_tab_font_style normal

macos_option_as_alt yes
macos_quit_when_last_window_closed yes

# font_family JetBrainsMono Nerd Font
font_family Agave Nerd Font

include themes/neutron.conf
# include thmes/afterglow.conf
# include themes/espresso.conf
# include themes/blazer.conf
# include themes/belafonte-day.conf
# include themes/arthur.conf
# include themes/apprentice.conf
